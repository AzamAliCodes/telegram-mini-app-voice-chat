version: '3.9'

services:
  bot:
    build: ./bot
    env_file: .env
    depends_on: [mongo, redis]
    restart: always
    networks: [vcnet]

  backend:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [mongo, redis]
    restart: always
    networks: [vcnet]

  frontend:
    build: ./frontend
    ports: ["5000:80"]
    restart: always
    networks: [vcnet]

  mongo:
    image: mongo:7
    volumes: [mongo_data:/data/db]
    networks: [vcnet]
    restart: always

  redis:
    image: redis:7-alpine
    networks: [vcnet]
    restart: always

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on: [backend, frontend]
    networks: [vcnet]
    restart: always

volumes:
  mongo_data:

networks:
  vcnet:
